name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress deploys are NOT cancelled so
# a partially-uploaded artifact is never left in a broken state.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Read ACCESS_PASSWORD from the secret (never shell-interpolate it to
      # avoid injection when the value contains quotes or special characters).
      - name: Compute access-password hash
        env:
          ACCESS_PASSWORD: ${{ secrets.ACCESS_PASSWORD }}
        run: |
          node -e "
            const { createHash } = require('crypto');
            const { appendFileSync } = require('fs');
            const password = process.env.ACCESS_PASSWORD || '12345';
            const hash = createHash('sha256').update(password).digest('hex');
            appendFileSync(process.env.GITHUB_ENV, 'NEXT_PUBLIC_ACCESS_PASSWORD_HASH=' + hash + '\n');
          "

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
